name: Feature Pipeline (hourly)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-ci.txt
      - name: Check required secrets
        run: |
          test -n "$HOPSWORKS_API_KEY" || { echo "Missing HOPSWORKS_API_KEY secret"; exit 1; }
          test -n "$HOPSWORKS_PROJECT" || { echo "Missing HOPSWORKS_PROJECT secret"; exit 1; }
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
      - name: Fetch + compute features
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          FEATURE_STORE: hopsworks
        run: python feature_pipeline.py
      - name: Upload feature snapshot artifact
        uses: actions/upload-artifact@v5
        with:
          name: features-snapshot
          path: data/features.parquet
          if-no-files-found: ignore
